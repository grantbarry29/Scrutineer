kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: scrutineer-dual
# Third dev cluster: dual-stack (IPv4+IPv6) for the egress-path posture e2e (#66).
# Scrutineer's decided posture is IPv4-only egress — on a dual-stack cluster the routing
# lock (default-deny, protocol-agnostic) and the Envoy backstop (no ::/0 allow rule) must
# deny ALL IPv6 egress by construction. That claim is only provable on a cluster that
# actually assigns IPv6 pod addresses, which is what this config exists for.
# Runs kind's built-in kindnetd (dual-stack capable, embeds kube-network-policies for
# family-aware NetworkPolicy enforcement — same CNI the scrutineer-dev cluster uses).
# Node image pinned to match ENVTEST_K8S_VERSION, as in kind-config.yaml.
networking:
  ipFamily: dual
nodes:
  - role: control-plane
    image: kindest/node:v1.31.4
