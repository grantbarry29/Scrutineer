kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: scrutineer-netpol
# Second dev cluster used only for NetworkPolicy *enforcement* e2e (Slice B, #61).
# kindnet (the scrutineer-dev cluster's CNI) does not enforce egress NetworkPolicy, so
# the routing-lock guarantee cannot be proven there. This cluster disables the default
# CNI and installs Calico (see .devcontainer/kind-up.sh KIND_CNI=calico), which does.
#
# podSubnet matches Calico's default IPv4 pool (192.168.0.0/16) so pod IPs stay within
# the routed range. Node image pinned to match ENVTEST_K8S_VERSION, as in kind-config.yaml.
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"
nodes:
  - role: control-plane
    image: kindest/node:v1.31.4
