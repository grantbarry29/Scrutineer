# Demo session under AUDIT-ONLY policy — the same probe script as demo-enforced.
# Nothing is blocked at the chokepoint, but every request is still observed and the
# would-be denial is recorded as `dry-run` evidence. The routing lock still applies
# (observation is only trustworthy if the proxy is the only path), so the direct-DNS
# bypass attempt stays blocked. Expected (see docs/demo.md):
#   DEMO_ALLOWED  example.com  -> SUCCEEDED
#   DEMO_DENIED   example.net -> SUCCEEDED   (recorded as dry-run in status)
#   DEMO_BYPASS   direct DNS   -> BLOCKED
apiVersion: scrutineer.sh/v1alpha1
kind: AgentSession
metadata:
  name: demo-audit
  namespace: default
spec:
  task:
    description: Egress-governance demo (audit-only mode)
    prompt: noop
  model:
    provider: openai
    name: gpt-4.1
  policyRefs:
  - name: demo-policy-audit
  runtimeProfileRef:
    name: demo-egress-proxy
  runtime:
    orchestrator: kubernetes-job
    image: busybox:latest
    command:
    - sh
    - -c
    - |
      sleep 12
      echo "demo agent (audit-only): probing through my governed egress path..."
      ok=""
      for i in 1 2 3 4 5 6 7 8; do
        if wget -q -O /dev/null "http://example.com/" 2>/dev/null; then ok=yes; break; fi
        sleep 3
      done
      if [ "$ok" = yes ]; then echo "DEMO_ALLOWED example.com -> SUCCEEDED"; else echo "DEMO_ALLOWED example.com -> FAILED (no internet from the cluster?)"; fi
      if wget -q -O /dev/null "http://example.net/" 2>/dev/null; then echo "DEMO_DENIED example.net -> SUCCEEDED"; else echo "DEMO_DENIED example.net -> BLOCKED"; fi
      if timeout 5 nslookup example.com >/dev/null 2>&1; then echo "DEMO_BYPASS direct DNS -> RESOLVED"; else echo "DEMO_BYPASS direct DNS -> BLOCKED"; fi
      echo "demo agent done; letting the evidence pipeline flush"
      sleep 15
