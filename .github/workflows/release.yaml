name: Release

# Publishes the two first-party images (scrutineer, scrutineer-egress-reporter) to ghcr when a version tag is pushed.
# The upstream Envoy image is not built here — it is pinned by digest in the
# Makefile (ENVOY_IMG) and pulled from upstream at deploy time.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # The deploy overlays pin newTag and the Makefile records the release VERSION;
  # publishing a tag that disagrees with them would ship manifests referencing a
  # different (possibly unpublished) version — fail fast instead. The controller's
  # self-referential image defaults no longer need checking here: they derive from
  # internal/version.Version, which the build step below bakes in from the tag (#112).
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Tag matches Makefile VERSION and overlay newTags
        run: |
          tag="${GITHUB_REF_NAME}"
          fail=0
          grep -q "^VERSION ?= ${tag}\$" Makefile \
            || { echo "Makefile VERSION does not match tag ${tag}"; fail=1; }
          for f in \
            config/manager/kustomization.yaml \
            config/reporter-standalone/kustomization.yaml; do
            grep -q "newTag: ${tag}\$" "$f" \
              || { echo "$f newTag does not match tag ${tag}"; fail=1; }
          done
          exit "$fail"

  publish:
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: scrutineer
            dockerfile: Dockerfile
          - image: scrutineer-egress-reporter
            dockerfile: Dockerfile.egress-reporter
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/grantbarry29/${{ matrix.image }}:${{ github.ref_name }}
          # Bake the release tag as the binary's build version so the controller's
          # self-referential image defaults point at this same release (#112).
          build-args: |
            VERSION=${{ github.ref_name }}
          # Keep the pushed artifact a plain two-arch OCI index (no provenance
          # manifest) so digest pins and node image matching stay predictable.
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # The GitHub Release object is the tag's human-readable face on the Releases
  # tab; the tag itself stays the release identity (dev-agent-rules/release-process.md).
  # Gated on the full publish matrix so notes never appear for a release whose
  # images aren't pullable.
  release-notes:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub Release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists — skipping (workflow re-run)"
            exit 0
          fi
          pre=""
          case "$tag" in *-*) pre="--prerelease" ;; esac
          gh release create "$tag" --verify-tag --generate-notes --title "$tag" $pre
