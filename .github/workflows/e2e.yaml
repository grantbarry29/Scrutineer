name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          install_only: true

      - name: Create kind cluster
        run: |
          kind create cluster --name scrutineer-dev --config .devcontainer/kind-config.yaml --wait 90s
          kubectl config use-context kind-scrutineer-dev

      - name: Install CRDs
        run: make install

      - name: Run e2e tests
        run: make test-e2e
