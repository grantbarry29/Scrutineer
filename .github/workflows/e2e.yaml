name: E2E

# Path scoping (#86): both jobs here are cluster-heavy — skip pushes that cannot
# change runtime behavior (docs, rules). Lint/Test (separate workflows) stay
# unconditional so every push keeps a green check. Caveat for a future PR flow:
# a path-skipped required check reports as skipped, not passed.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "dev-agent-rules/**"
      - "**.md"
      - "LICENSE"
      - ".cursor/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "dev-agent-rules/**"
      - "**.md"
      - "LICENSE"
      - ".cursor/**"

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          install_only: true

      - name: Create kind cluster
        run: |
          kind create cluster --name scrutineer-dev --config .devcontainer/kind-config.yaml --wait 90s
          kubectl config use-context kind-scrutineer-dev

      - name: Install CRDs
        run: make install

      - name: Run e2e tests
        run: make test-e2e

      # Post-mortem before the cluster (and its logs/events) vanish with the runner (#110).
      - name: Dump cluster diagnostics
        if: failure()
        run: hack/ci-dump-diagnostics.sh

  # Networking enforcement suite (#91): routing lock, Envoy RBAC, observed evidence,
  # lock-gate differential — the product's core guarantee, per-push on the kindnet
  # flavor (runner-hosted kindnetd enforces egress NetworkPolicy; proven by the
  # quickstart smoke's VERIFIED gate verdict). Decision on record: Calico and
  # dual-stack cross-checks stay local-only (make test-e2e-net-all) until the
  # nightly correctness-pipeline split (#93).
  e2e-networking:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          install_only: true

      - name: Create kind cluster
        run: |
          kind create cluster --name scrutineer-dev --config .devcontainer/kind-config.yaml --wait 90s
          kubectl config use-context kind-scrutineer-dev

      - name: Install CRDs
        run: make install

      - name: Load data-plane images (controller + Envoy + egress-reporter)
        run: make test-e2e-images

      - name: Run networking e2e suite
        run: make test-e2e-net

      # Post-mortem before the cluster (and its logs/events) vanish with the runner (#110).
      - name: Dump cluster diagnostics
        if: failure()
        run: hack/ci-dump-diagnostics.sh
