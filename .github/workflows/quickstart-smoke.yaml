# Front-door smoke (#78): prove the fresh-clone experience stays green.
# Runs the real thing — `make quickstart` (dedicated kind cluster, first-party images
# built from this checkout, controller deployed, lock-gate verdict must come back
# VERIFIED) followed by `make demo` (both demo sessions must reach Succeeded and print
# the expected evidence). Both targets exit non-zero on any deviation, so no extra
# assertions are needed here.
# Images are always built from source, never pulled from ghcr (#109): a released tag
# can silently predate this checkout's controller behavior (v0.1.0 predates the lock
# gate and broke every run once the packages went public).
name: Quickstart Smoke

# Path scoping (#86): cluster-heavy job — skip pushes that cannot change runtime
# behavior (docs, rules, memory). Everything the quickstart/demo path actually
# depends on (Makefile, config/, api/, internal/, cmd/, Dockerfiles, go.mod,
# workflows) still triggers. Caveat for a future PR flow: a path-skipped required
# check reports as skipped, not passed — revisit when branch protection arrives.
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "dev-agent-rules/**"
      - "**.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "dev-agent-rules/**"
      - "**.md"
      - "LICENSE"

permissions:
  contents: read

jobs:
  quickstart-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Install kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          install_only: true

      - name: Quickstart (cluster + controller + lock-gate verdict)
        run: make quickstart

      - name: Demo (enforced vs audit-only egress governance)
        run: make demo

      # Post-mortem before the cluster (and its logs/events) vanish with the runner (#110).
      - name: Dump cluster diagnostics
        if: failure()
        run: hack/ci-dump-diagnostics.sh

      - name: Tear down
        if: always()
        run: |
          make demo-down || true
          make quickstart-down || true
