name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Vet
        run: make vet

      # Derived artifacts must be committed in sync: regenerating them is a no-op
      # (same round-trip invariant lint-docs enforces for index bullets).
      - name: Check generated code is current (controller-gen)
        run: |
          make manifests generate
          git diff --exit-code

      - name: Check go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: OKF docs lint
        run: make lint-docs
