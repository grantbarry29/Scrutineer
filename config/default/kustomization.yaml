namespace: scrutineer-system

namePrefix: ""

# `labels` with includeSelectors:true is the non-deprecated equivalent of the old
# `commonLabels` — it stamps the label on metadata, selectors, AND pod templates, so the
# `kustomize build` output is byte-identical (verified). Plain `labels` would omit selectors.
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: scrutineer

# Base install: CRDs + RBAC + manager only. Webhook and cert-manager overlays are opt-in,
# kept out of the default to avoid a hard cert-manager dependency. A production Helm chart /
# improved kustomize overlays (values-driven install, webhook + cert-manager toggles) → #5.
resources:
- ../crd
- ../rbac
- ../manager

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
