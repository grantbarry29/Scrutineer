---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-scrutineer-sh-v1alpha1-approvalrequest
  failurePolicy: Fail
  name: mapprovalrequest.scrutineer.sh
  rules:
  - apiGroups:
    - scrutineer.sh
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - approvalrequests
  sideEffects: None
