# Dedicated runtime-evidence reporter: its own ServiceAccount (bound to the
# least-privilege reporter-role) and Deployment running the manager image in
# --reporter-only mode. Deploying this (via the config/reporter-standalone
# overlay) lets the manager drop the reporter's RBAC — see issue #34.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scrutineer-reporter
  namespace: scrutineer-system
  labels:
    app.kubernetes.io/name: scrutineer
    app.kubernetes.io/component: reporter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scrutineer-controller-reporter
  namespace: scrutineer-system
  labels:
    app.kubernetes.io/name: scrutineer
    app.kubernetes.io/component: reporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scrutineer
      app.kubernetes.io/component: reporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scrutineer
        app.kubernetes.io/component: reporter
    spec:
      serviceAccountName: scrutineer-reporter
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: reporter
        image: controller:latest
        args:
        - --reporter-only
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        - --reporter-bind-address=:8088
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 8088
          name: reporter
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 250m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      terminationGracePeriodSeconds: 10
