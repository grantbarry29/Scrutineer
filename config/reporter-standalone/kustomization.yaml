# Opt-in overlay that isolates the runtime evidence reporter from the manager.
#
# On top of config/default it:
#   - adds a scrutineer-reporter ServiceAccount + a --reporter-only Deployment,
#   - disables the in-process reporter in the manager (--enable-reporter=false),
#   - retargets the reporter-role binding to the scrutineer-reporter ServiceAccount,
#   - points the reporter Service at the reporter Deployment's pods.
#
# Result: the manager ServiceAccount keeps only manager-role, and the reporter's
# RBAC lives solely with the dedicated scrutineer-reporter identity. See issue #34.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../default
- reporter.yaml

images:
- name: controller
  newName: ghcr.io/grantbarry29/scrutineer
  newTag: v0.1.0

patches:
# Disable the in-process reporter in the manager.
- target:
    kind: Deployment
    name: scrutineer-controller-manager
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: --enable-reporter=false
# Bind reporter-role to the dedicated reporter ServiceAccount instead of the manager's.
- target:
    kind: ClusterRoleBinding
    name: scrutineer-reporter-rolebinding
  patch: |-
    - op: replace
      path: /subjects/0/name
      value: scrutineer-reporter
# Route the reporter Service to the reporter Deployment's pods.
- target:
    kind: Service
    name: scrutineer-controller-reporter
  patch: |-
    - op: replace
      path: /spec/selector/app.kubernetes.io~1component
      value: reporter
