apiVersion: scrutineer.sh/v1alpha1
kind: RuntimeProfile
metadata:
  name: hardened-agent
  namespace: default
spec:
  container:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  pod:
    seccompProfile:
      type: RuntimeDefault
  enforcement:
  - name: egress-envoy
    type: envoy
    enabled: false
