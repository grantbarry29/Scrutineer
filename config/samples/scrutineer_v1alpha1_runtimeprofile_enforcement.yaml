# RuntimeProfile with data-plane enforcement. The only enforcement type is `envoy`:
# a per-session out-of-pod Envoy egress proxy (its own pod/identity) whose egress
# evidence is stamped `observed` -- see docs/design/evidence-integrity.md and
# docs/design/untamperable-pivot.md. The cooperative in-pod backends were removed
# in the untamperable pivot (#71).
apiVersion: scrutineer.sh/v1alpha1
kind: RuntimeProfile
metadata:
  name: enforced-egress
  namespace: default
spec:
  container:
    runAsNonRoot: true
    # The sample session runs busybox (root by default): runAsUser remaps the UID so
    # runAsNonRoot is satisfiable (#82 — without it: CreateContainerConfigError).
    runAsUser: 65532
    runAsGroup: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  pod:
    seccompProfile:
      type: RuntimeDefault
  enforcement:
  - name: envoy
    type: envoy
    enabled: true
