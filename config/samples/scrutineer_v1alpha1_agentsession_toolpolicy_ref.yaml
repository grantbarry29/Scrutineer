apiVersion: scrutineer.sh/v1alpha1
kind: AgentSession
metadata:
  name: session-with-toolpolicy
  namespace: default
spec:
  task:
    description: "Run with AgentPolicy + ToolPolicy refs"
    prompt: "Echo effective tool policy."
  model:
    provider: openai
    name: gpt-4.1
  runtime:
    orchestrator: kubernetes-job
    image: busybox:latest
    command:
    - sh
    - -c
    - |
      echo "Denied tools: $AGENT_POLICY_DENIED_TOOLS"
      echo "Max tool calls: $AGENT_POLICY_MAX_TOOL_CALLS"
      sleep 3
  policyRefs:
  - kind: AgentPolicy
    name: prod-agents-baseline
  - kind: ToolPolicy
    name: mcp-tools-baseline
  policy:
    deniedTools:
    - deploy_production
