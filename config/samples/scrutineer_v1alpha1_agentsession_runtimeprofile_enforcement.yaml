# AgentSession using the enforced-egress RuntimeProfile (per-session out-of-pod Envoy proxy).
# Requires scrutineer-controller-reporter Service in scrutineer-system (make deploy).
apiVersion: scrutineer.sh/v1alpha1
kind: AgentSession
metadata:
  name: egress-demo
  namespace: default
spec:
  task:
    description: Demonstrate Envoy egress proxy + reporter wiring
    prompt: noop
  model:
    provider: openai
    name: gpt-4.1
  runtime:
    orchestrator: kubernetes-job
    image: busybox:latest
    command:
    - sh
    - -c
    - echo ok; exit 0
  runtimeProfileRef:
    name: enforced-egress
