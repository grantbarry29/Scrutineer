# RuntimeProfile with enforcement sidecars and runtime reporter wiring.
# When enabled sidecars (dns-proxy, tool-gateway, envoy) are present, the
# controller injects SCRUTINEER_REPORTER_URL, a projected SA token (audience:
# scrutineer-reporter), and mounts the token into sidecar containers only.
apiVersion: scrutineer.sh/v1alpha1
kind: RuntimeProfile
metadata:
  name: enforced-sidecars
  namespace: default
spec:
  container:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  pod:
    seccompProfile:
      type: RuntimeDefault
  sidecars:
  - name: egress
    type: dns-proxy
    enabled: true
  - name: tools
    type: tool-gateway
    enabled: true
