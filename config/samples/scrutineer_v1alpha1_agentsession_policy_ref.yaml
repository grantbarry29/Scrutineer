apiVersion: scrutineer.sh/v1alpha1
kind: AgentSession
metadata:
  name: session-with-policy-ref
  namespace: default
spec:
  task:
    description: "Run with a referenced baseline policy"
    prompt: "Echo effective policy env vars."
  model:
    provider: openai
    name: gpt-4.1
  runtime:
    orchestrator: kubernetes-job
    image: busybox:latest
    command:
    - sh
    - -c
    - |
      echo "Mode: $AGENT_POLICY_MODE"
      echo "Denied tools: $AGENT_POLICY_DENIED_TOOLS"
      echo "Allowed domains: $AGENT_POLICY_ALLOWED_DOMAINS"
      sleep 3
  policyRefs:
  - kind: AgentPolicy
    name: prod-agents-baseline
  policy:
    allowedDomains:
    - github.com
    deniedTools:
    - deploy_production
