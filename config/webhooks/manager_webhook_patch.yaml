apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-controller-manager
  namespace: relay-system
spec:
  template:
    spec:
      containers:
      - name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        volumeMounts:
        - name: cert
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: cert
        secret:
          secretName: webhook-server-cert
          defaultMode: 420
