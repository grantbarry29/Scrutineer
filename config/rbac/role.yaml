---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - scrutineer.sh
  resources:
  - agentpolicies
  - approvalpolicies
  - runtimeprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - scrutineer.sh
  resources:
  - agentsessions
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - scrutineer.sh
  resources:
  - agentsessions/finalizers
  verbs:
  - update
- apiGroups:
  - scrutineer.sh
  resources:
  - agentsessions/status
  - approvalrequests/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - scrutineer.sh
  resources:
  - approvalrequests
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
