  name: agentsessions.relay.secureai.dev
spec:
  group: relay.secureai.dev
  names:
    kind: AgentSession
    listKind: AgentSessionList
    plural: agentsessions
    shortNames:
    - as
    - agentsess
    singular: agentsession
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
