---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: agentpolicies.scrutineer.sh
spec:
  group: scrutineer.sh
  names:
    kind: AgentPolicy
    listKind: AgentPolicyList
    plural: agentpolicies
    shortNames:
    - ap
    - agentpol
    singular: agentpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentPolicy is a reusable governance policy that AgentSessions
          can reference.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentPolicySpec defines reusable governance rules for AgentSessions.
            properties:
              allowedCIDRs:
                description: |-
                  AllowedCIDRs is an IPv4/CIDR allowlist for outbound network access. Entries are a
                  canonical dotted-quad ("203.0.113.5", an exact address) or a masked IPv4 CIDR
                  ("10.0.0.0/8"); IPv6 is not supported (the egress path is IPv4-only, #66). The CRD
                  pattern is the apply-time line of defense; the stricter shared validator is
                  enforcement.ValidateCIDRPattern (reconcile-time, also rejects unmasked and
                  non-canonical forms) — keep the two in sync.

                  When the Envoy egress chokepoint is enabled, these entries are enforced AT THE
                  PROXY as authority matching (#125): they police IPv4-LITERAL DIALS — a CONNECT or
                  Host authority that is a numeric address. Canonical dotted-quads match the ranges;
                  non-canonical numeric spellings a resolver would expand into a range (leading-zero
                  octets, inet_aton short forms) are refused fail-closed so they can't evade a
                  deny-list (#126). A *hostname* that resolves to an address in these ranges is NOT
                  matched here (govern hostnames with the domain fields; resolved-address enforcement
                  is a separate future design). On the legacy non-Envoy path these entries render a
                  coarse NetworkPolicy instead (enforced mode only).
                items:
                  maxLength: 18
                  pattern: ^[0-9]{1,3}(\.[0-9]{1,3}){3}(/[0-9]{1,2})?$
                  type: string
                type: array
              allowedDomains:
                description: |-
                  AllowedDomains is an FQDN allowlist for outbound network access. Patterns are an
                  exact hostname or a single leading "*." wildcard — lowercase letters, digits,
                  '.', '-' only (#103). The CRD pattern is the apply-time line of defense; the
                  stricter shared validator is enforcement.ValidateDomainPattern (reconcile-time,
                  also rejects empty labels) — keep the two in sync.
                items:
                  maxLength: 253
                  pattern: ^(\*\.)?[a-z0-9]([a-z0-9.-]*[a-z0-9])?$
                  type: string
                type: array
              deniedCIDRs:
                description: |-
                  DeniedCIDRs is an IPv4/CIDR denylist for outbound network access. Same entry
                  contract, enforcement point, and IP-literal-only limitation as AllowedCIDRs.
                items:
                  maxLength: 18
                  pattern: ^[0-9]{1,3}(\.[0-9]{1,3}){3}(/[0-9]{1,2})?$
                  type: string
                type: array
              deniedDomains:
                description: |-
                  DeniedDomains is an FQDN denylist for outbound network access. Same pattern
                  contract as AllowedDomains (#103).
                items:
                  maxLength: 253
                  pattern: ^(\*\.)?[a-z0-9]([a-z0-9.-]*[a-z0-9])?$
                  type: string
                type: array
              mode:
                allOf:
                - enum:
                  - audit-only
                  - dry-run
                  - enforced
                - enum:
                  - audit-only
                  - dry-run
                  - enforced
                default: audit-only
                description: |-
                  Mode controls how rules are interpreted once enforcement exists.
                  Defaults to audit-only when unset.
                type: string
              requireHumanApproval:
                description: RequireHumanApproval lists action types that require
                  human approval before execution.
                items:
                  type: string
                type: array
            type: object
          status:
            description: AgentPolicyStatus defines the observed state of an AgentPolicy.
            properties:
              observedGeneration:
                description: |-
                  ObservedGeneration is the last spec generation observed by a controller.
                  Reserved for a future AgentPolicy controller; unused in Phase 2 slice.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
