---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: toolpolicies.relay.secureai.dev
spec:
  group: relay.secureai.dev
  names:
    kind: ToolPolicy
    listKind: ToolPolicyList
    plural: toolpolicies
    shortNames:
    - tp
    - toolpol
    singular: toolpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ToolPolicy is a reusable tool/MCP policy that AgentSessions can
          reference.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ToolPolicySpec defines reusable tool/MCP governance rules
              for AgentSessions.
            properties:
              allowedTools:
                description: AllowedTools lists tool/MCP identifiers the agent may
                  invoke.
                items:
                  type: string
                type: array
              argumentRules:
                description: |-
                  ArgumentRules constrain tool calls by their arguments (e.g. restrict read_file to
                  /workspace), applied only after name-level allow/deny. Declared and propagated
                  policy; enforcement is Phase 3 (tool gateway). See
                  docs/design/phase-3-tool-argument-constraints.md.
                items:
                  description: |-
                    ToolArgumentRule constrains the arguments of matching tool calls. It applies only to
                    calls that already passed name-level allow/deny. Enforcement is the tool gateway's job
                    (Phase 3); this models declared + propagated policy.
                  properties:
                    constraints:
                      description: |-
                        Constraints are ANDed: every constraint must pass for the call to be allowed by
                        this rule.
                      items:
                        description: |-
                          ArgumentConstraint matches one tool-argument value and declares whether a match allows
                          or denies the call. v1 uses structured matchers (not an expression language). See
                          docs/design/phase-3-tool-argument-constraints.md.
                        properties:
                          arg:
                            description: |-
                              Arg is a dotted path into the tool's argument object (e.g. "path", "args[0]",
                              "options.recursive").
                            minLength: 1
                            type: string
                          effect:
                            default: Deny
                            description: |-
                              Effect declares what a match means. Deny (default) blocks the call; Allow makes the
                              constraint an allowlist gate (call permitted only if it matches).
                            enum:
                            - Allow
                            - Deny
                            type: string
                          op:
                            description: Op is the comparison operator.
                            enum:
                            - Equals
                            - NotEquals
                            - In
                            - NotIn
                            - Matches
                            - NotMatches
                            - HasPrefix
                            - NotHasPrefix
                            - Exists
                            - NotExists
                            type: string
                          values:
                            description: |-
                              Values holds the operands: regular expressions for Matches/NotMatches, literals
                              otherwise. Ignored for Exists/NotExists.
                            items:
                              type: string
                            type: array
                        required:
                        - arg
                        - op
                        type: object
                      minItems: 1
                      type: array
                    server:
                      description: Server optionally scopes the rule to a single MCP
                        server / provider id.
                      type: string
                    tools:
                      description: Tools lists tool identifiers this rule applies
                        to. "*" matches any tool.
                      items:
                        type: string
                      minItems: 1
                      type: array
                  required:
                  - constraints
                  - tools
                  type: object
                type: array
              deniedTools:
                description: DeniedTools lists tool/MCP identifiers the agent must
                  not invoke.
                items:
                  type: string
                type: array
              maxCallsPerMinute:
                description: MaxCallsPerMinute caps tool invocations per minute (propagated
                  to effective policy and env; enforcement is Phase 3).
                format: int32
                minimum: 0
                type: integer
              maxToolCalls:
                description: MaxToolCalls caps total tool invocations for the session.
                format: int32
                minimum: 0
                type: integer
              mode:
                allOf:
                - enum:
                  - audit-only
                  - dry-run
                  - enforced
                - enum:
                  - audit-only
                  - dry-run
                  - enforced
                default: audit-only
                description: |-
                  Mode controls how tool rules are interpreted once enforcement exists.
                  Defaults to audit-only when unset.
                type: string
            type: object
          status:
            description: ToolPolicyStatus defines the observed state of a ToolPolicy.
            properties:
              observedGeneration:
                description: ObservedGeneration is reserved for a future ToolPolicy
                  controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
