---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: approvalrequests.scrutineer.sh
spec:
  group: scrutineer.sh
  names:
    kind: ApprovalRequest
    listKind: ApprovalRequestList
    plural: approvalrequests
    shortNames:
    - appreq
    - approvalreq
    singular: approvalrequest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.sessionRef.name
      name: Session
      type: string
    - jsonPath: .spec.action
      name: Action
      type: string
    - jsonPath: .status.state
      name: State
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ApprovalRequest is a per-decision, controller-owned object a human grants or
          denies to gate an AgentSession. See docs/design/approval-workflows.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ApprovalRequestSpec is created by the controller when a gated AgentSession
              needs human approval. Approvers act on it by setting spec.decision.
            properties:
              action:
                description: Action is the gated action type (e.g. "deploy").
                minLength: 1
                type: string
              decidedBy:
                description: |-
                  DecidedBy is the approver's self-declared identity, set alongside Decision.
                  It is best-effort and NOT authenticated — the real gate is RBAC on who may
                  patch this object; authenticated capture needs a future validating webhook.
                  When the matching ApprovalPolicy lists approvers, a grant is only honored if
                  DecidedBy matches a listed approver name.
                type: string
              decision:
                default: ""
                description: |-
                  Decision is the human decision. Empty means pending. This is the
                  primary field approvers mutate (RBAC + future webhook enforce it).
                enum:
                - ""
                - granted
                - denied
                type: string
              policyRef:
                description: PolicyRef is the ApprovalPolicy that triggered this request,
                  if any.
                type: string
              requestId:
                description: |-
                  RequestID correlates a runtime hold with the data-plane call that raised it
                  and is the idempotency key the reporter uses to avoid creating duplicate
                  requests for the same tool call. Empty for session gates.
                type: string
              scope:
                description: Scope bounds what is being approved.
                properties:
                  argDigest:
                    description: |-
                      ArgDigest is a redacted fingerprint (e.g. sha256) of the tool-call
                      arguments a runtime approval is scoped to. It NEVER carries raw argument
                      values — only a digest — so evidence stays redaction-safe. Empty for
                      session gates.
                    type: string
                  target:
                    description: Target is the entity being approved (deploy target,
                      domain, tool, path).
                    type: string
                  window:
                    description: |-
                      Window is how long the approval remains valid once granted. Unset means
                      it does not auto-expire after grant. For runtime holds with no matching
                      ApprovalPolicy, this supplies the post-grant validity window.
                    type: string
                type: object
              sessionRef:
                description: SessionRef is the AgentSession this request gates.
                properties:
                  name:
                    description: Name of the AgentSession.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              trigger:
                default: session
                description: |-
                  Trigger distinguishes a pre-execution session gate (default) from a
                  mid-execution per-tool-call hold. Empty is treated as "session" for
                  backward compatibility.
                enum:
                - session
                - runtime
                type: string
            required:
            - action
            - sessionRef
            type: object
          status:
            description: ApprovalRequestStatus is owned by the controller.
            properties:
              approvedBy:
                description: |-
                  ApprovedBy is the set of distinct approver identities that have granted this
                  request. It is only populated for allOf policies (multi-approver): the gate
                  opens once it covers every listed approver. Controller-owned and best-effort
                  (entries come from the self-declared spec.decidedBy of each grant).
                items:
                  type: string
                type: array
                x-kubernetes-list-type: set
              decidedAt:
                description: DecidedAt is when the decision was observed.
                format: date-time
                type: string
              decidedBy:
                description: |-
                  DecidedBy records the subject that set the decision (best-effort until a
                  validating webhook captures userInfo).
                type: string
              expiresAt:
                description: ExpiresAt is when a granted approval stops being valid
                  (DecidedAt + window).
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the last generation reconciled.
                format: int64
                type: integer
              reason:
                description: Reason is a short human-readable explanation of the current
                  state.
                type: string
              state:
                description: State is the observed lifecycle state.
                enum:
                - Pending
                - Granted
                - Denied
                - Expired
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
