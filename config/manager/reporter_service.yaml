apiVersion: v1
kind: Service
metadata:
  name: scrutineer-controller-reporter
  namespace: scrutineer-system
  labels:
    app.kubernetes.io/name: scrutineer
    app.kubernetes.io/component: controller-manager
spec:
  selector:
    app.kubernetes.io/name: scrutineer
    app.kubernetes.io/component: controller-manager
  ports:
  - name: reporter
    port: 8088
    targetPort: reporter
    protocol: TCP
