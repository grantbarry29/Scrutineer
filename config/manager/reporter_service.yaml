apiVersion: v1
kind: Service
metadata:
  name: relay-controller-reporter
  namespace: relay-system
  labels:
    app.kubernetes.io/name: relay
    app.kubernetes.io/component: controller-manager
spec:
  selector:
    app.kubernetes.io/name: relay
    app.kubernetes.io/component: controller-manager
  ports:
  - name: reporter
    port: 8088
    targetPort: reporter
    protocol: TCP
