# Self-signed issuer + serving certificate for the admission webhook server.
# Requires cert-manager (https://cert-manager.io) installed in the cluster.
# The certificate's secret is mounted into the manager and cert-manager's
# ca-injector injects the CA bundle into the MutatingWebhookConfiguration via the
# cert-manager.io/inject-ca-from annotation applied in the webhooks overlay.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: scrutineer-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
  namespace: scrutineer-system
spec:
  # DNS names match the webhook Service (scrutineer-system/webhook-service).
  dnsNames:
  - webhook-service.scrutineer-system.svc
  - webhook-service.scrutineer-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: webhook-server-cert
